name: CI Pipeline

on:
  push:
    branches: [ main, develop ]

jobs:
  check-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify files exist
        run: |
          test -f index.html && echo "index.html found"
          test -f style.css && echo "style.css found"
          test -f main.js && echo "main.js found"

  security:
    needs: check-files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no .env file
        run: |
          if [ -f .env ]; then
            echo "Danger: .env file found!" && exit 1
          else
            echo "Safe: no .env file"
          fi

  report:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Success message
        if: success()
        run: echo "Deployed by ${{ github.actor }} on branch ${{ github.ref_name }}"
      - name: Failure message
        if: failure()
        run: echo "Pipeline failed for ${{ github.actor }}"