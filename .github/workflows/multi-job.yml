name: Multi Job Pipeline

on:
  push:
    branches: [ main ]

env:
  APP_NAME: EduPak
  VERSION: "1.0"

jobs:
  check-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Checking files..."

  print-info:
    needs: check-files
    runs-on: ubuntu-latest
    steps:
      - run: echo "App: $APP_NAME Version: $VERSION"

  final-message:
    needs: print-info
    runs-on: ubuntu-latest
    steps:
      - run: echo "Pipeline finished successfully"